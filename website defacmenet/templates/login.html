{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="glass-panel p-5 text-center">
    <div class="mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-glow-green rounded-circle p-3 mb-3" style="width: 70px; height: 70px; font-size: 1.8rem;">
            <i class="bi bi-shield-lock glow-green"></i>
        </div>
        <h2 class="fw-bold">System Access</h2>
        <p class="text-secondary small">Sentinel Guard Web Defacement Monitor</p>
    </div>
    
    <form action="{{ url_for('auth.login') }}" method="POST" class="text-start">
        <!-- CSRF Protection Token -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="mb-3">
            <label for="username_or_email" class="form-label text-secondary small">Username or Email</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control bg-transparent border-secondary text-white" id="username_or_email" name="username_or_email" required placeholder="admin or admin@mail.com">
            </div>
        </div>
        
        <div class="mb-4">
            <label for="password" class="form-label text-secondary small">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-key"></i></span>
                <input type="password" class="form-control bg-transparent border-secondary text-white" id="password" name="password" required placeholder="••••••••">
            </div>
        </div>
        
        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-cyber-primary py-2.5">
                <i class="bi bi-box-arrow-in-right me-2"></i>Authenticate
            </button>
        </div>
    </form>
    
    <div class="mt-4 pt-3 border-top border-secondary border-opacity-25">
        <p class="text-secondary small mb-0">First time here? <a href="{{ url_for('auth.register') }}" class="text-info text-decoration-none fw-semibold">Register Admin Account</a></p>
    </div>
</div>
{% endblock %}
